<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Tree Drive — Scout Tree Pickup</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --green:        #2d5a27;
      --green-light:  #3d7a35;
      --green-dark:   #192e16;
      --khaki:        #c8b560;
      --tan:          #d4b896;
      --orange:       #f4831f;
      --orange-dark:  #c96a10;
      --bg:           #0f1a0e;
      --bg2:          #172214;
      --bg3:          #1e2d1b;
      --bg4:          #253522;
      --text:         #e8e0d0;
      --text-muted:   #8a9a7a;
      --border:       #2e3e2b;
      --available:    #5cb85c;
      --claimed:      #f0ad4e;
      --loaded:       #777;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%; height: 100dvh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg); color: var(--text);
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; }

    /* ─── HEADER ─────────────────────────────────────────────────────────── */
    header {
      flex-shrink: 0;
      background: var(--green-dark);
      border-bottom: 2px solid var(--khaki);
      padding: 10px 14px;
      padding-top: max(10px, env(safe-area-inset-top));
      display: flex; align-items: center; gap: 10px; z-index: 100;
    }
    .logo {
      width: 42px; height: 42px;
      background: var(--khaki); border-radius: 50%; border: 2px solid var(--orange);
      display: flex; align-items: center; justify-content: center;
      font-size: 21px; flex-shrink: 0;
    }
    .header-text { flex: 1; min-width: 0; }
    .header-text h1 {
      font-size: 17px; font-weight: 800; color: var(--khaki);
      letter-spacing: 1.5px; text-transform: uppercase; line-height: 1.1;
    }
    .header-text p { font-size: 11px; color: var(--tan); opacity: 0.75; }
    .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

    .icon-btn {
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 7px;
      padding: 7px 10px; font-size: 15px; cursor: pointer; touch-action: manipulation;
    }
    .icon-btn:active { background: var(--bg3); }

    /* Live indicator */
    .conn-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--loaded); flex-shrink: 0;
      transition: background 0.4s;
      box-shadow: 0 0 0 0 transparent;
    }
    .conn-dot.live {
      background: var(--available);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%   { box-shadow: 0 0 0 0 rgba(92,184,92,0.6); }
      70%  { box-shadow: 0 0 0 6px rgba(92,184,92,0); }
      100% { box-shadow: 0 0 0 0 rgba(92,184,92,0); }
    }

    .role-toggle {
      display: flex; background: var(--bg3);
      border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
    }
    .role-btn {
      padding: 8px 12px; border: none; background: transparent;
      color: var(--text-muted); font-size: 12px; font-weight: 700;
      cursor: pointer; touch-action: manipulation; white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .role-btn.active { background: var(--green); color: var(--text); }

    /* ─── STATS BAR ──────────────────────────────────────────────────────── */
    .stats-bar {
      flex-shrink: 0; background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex; padding: 6px 8px;
    }
    .stat { flex: 1; text-align: center; padding: 4px 0; }
    .stat-val { font-size: 22px; font-weight: 800; line-height: 1.1; color: var(--khaki); }
    .stat-val.g { color: var(--available); }
    .stat-val.o { color: var(--claimed); }
    .stat-val.s { color: var(--loaded); }
    .stat-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.7px; color: var(--text-muted); }

    /* ─── MAIN ───────────────────────────────────────────────────────────── */
    .main { flex: 1; min-height: 0; display: flex; position: relative; }

    /* ─── MAP ────────────────────────────────────────────────────────────── */
    .map-wrap { flex: 1; position: relative; min-width: 0; }
    #map { width: 100%; height: 100%; }

    .map-hint {
      position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.72); color: var(--tan);
      padding: 8px 18px; border-radius: 20px; font-size: 13px; font-weight: 600;
      pointer-events: none; z-index: 400; white-space: nowrap;
      border: 1px solid var(--border); transition: opacity 0.3s;
    }
    .locate-fab {
      position: absolute; bottom: 16px; right: 16px; z-index: 400;
      background: var(--bg2); border: 1px solid var(--border); color: var(--text);
      border-radius: 10px; padding: 11px 13px; font-size: 18px;
      cursor: pointer; box-shadow: 0 3px 10px rgba(0,0,0,.5); touch-action: manipulation;
    }
    .leaflet-control-zoom { margin-top: 12px !important; margin-right: 12px !important; }
    .leaflet-control-zoom a {
      background: var(--bg2) !important; color: var(--text) !important;
      border-color: var(--border) !important;
    }

    /* ─── CREW PANEL ─────────────────────────────────────────────────────── */
    .crew-panel {
      width: 310px; flex-shrink: 0;
      background: var(--bg2); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; overflow: hidden;
      z-index: 200; transition: transform 0.3s ease;
    }
    .crew-panel.hidden { display: none; }

    .panel-head {
      flex-shrink: 0; padding: 11px 14px;
      background: var(--bg3); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      font-size: 13px; font-weight: 700; color: var(--khaki);
    }
    .panel-count {
      margin-left: auto; background: var(--green); color: var(--text);
      border-radius: 10px; padding: 2px 8px; font-size: 11px; font-weight: 700;
    }
    .tree-list {
      flex: 1; overflow-y: auto; padding: 8px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .tree-card {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 10px; padding: 11px; cursor: pointer;
      border-left-width: 4px; transition: opacity 0.2s;
    }
    .tree-card.available  { border-left-color: var(--available); }
    .tree-card.claimed    { border-left-color: var(--claimed); }
    .tree-card.picked_up  { border-left-color: var(--loaded); opacity: 0.5; }
    .tree-card:active { opacity: 0.75; }
    .card-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
    .card-address { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; margin-right: 6px; line-height: 1.3; }
    .card-dist    { font-size: 11px; font-weight: 700; color: var(--orange); white-space: nowrap; }
    .card-meta    { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .card-note    { font-size: 11px; color: var(--tan); font-style: italic; margin-bottom: 7px; }
    .card-actions { display: flex; gap: 6px; }
    .panel-toolbar {
      flex-shrink: 0; padding: 8px;
      border-top: 1px solid var(--border); background: var(--bg3);
      display: flex; gap: 6px;
    }

    /* ─── FAB ────────────────────────────────────────────────────────────── */
    .list-fab {
      display: none; position: absolute; bottom: 70px; right: 16px; z-index: 450;
      background: var(--orange); color: white; border: none;
      border-radius: 50%; width: 54px; height: 54px; font-size: 22px;
      cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.5);
      touch-action: manipulation; align-items: center; justify-content: center;
    }

    /* ─── MOBILE ─────────────────────────────────────────────────────────── */
    @media (max-width: 640px) {
      .crew-panel {
        position: absolute; left: 0; right: 0; bottom: 0;
        width: 100%; height: 48%; border-left: none;
        border-top: 2px solid var(--khaki);
        border-radius: 18px 18px 0 0;
        padding-bottom: env(safe-area-inset-bottom);
        transform: translateY(0);
      }
      .crew-panel.hidden { display: flex; transform: translateY(100%); pointer-events: none; }
      .list-fab   { display: flex; }
      .locate-fab { bottom: 70px; }
      .map-hint   { bottom: 70px; }
    }

    /* ─── BUTTONS ────────────────────────────────────────────────────────── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 4px;
      padding: 10px 14px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 700; cursor: pointer; touch-action: manipulation;
      transition: filter 0.15s, transform 0.1s; text-align: center; flex: 1; white-space: nowrap;
    }
    .btn:active { transform: scale(0.96); filter: brightness(0.9); }
    .btn:disabled { opacity: 0.4; cursor: default; }
    .btn-green  { background: var(--green);  color: #fff; }
    .btn-orange { background: var(--orange); color: #fff; }
    .btn-gray   { background: var(--bg4); color: var(--text-muted); border: 1px solid var(--border); }
    .btn-khaki  { background: transparent; color: var(--khaki); border: 1px solid var(--khaki); }
    .btn-sm     { padding: 7px 10px; font-size: 11px; }
    .btn-red    { background: #7a2525; color: #ffaaaa; border: 1px solid #a03030; }

    .badge {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; border-radius: 12px;
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
    }
    .badge-available { background: rgba(92,184,92,0.18);  color: var(--available); }
    .badge-claimed   { background: rgba(240,173,78,0.18); color: var(--claimed); }
    .badge-picked_up { background: rgba(120,120,120,0.18);color: var(--loaded); }

    /* ─── MODALS ─────────────────────────────────────────────────────────── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65); z-index: 9000;
      display: flex; align-items: flex-end; justify-content: center;
      backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    }
    .overlay.hidden { display: none; }
    .sheet {
      background: var(--bg2); border-top: 2px solid var(--khaki);
      border-radius: 20px 20px 0 0; width: 100%; max-width: 520px;
      max-height: 90dvh; overflow-y: auto;
      padding: 18px; padding-bottom: max(18px, env(safe-area-inset-bottom));
      animation: slideUp 0.22s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(24px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .sheet-handle {
      width: 40px; height: 4px; background: var(--border);
      border-radius: 2px; margin: 0 auto 16px;
    }
    .sheet-title { font-size: 18px; font-weight: 800; color: var(--khaki); margin-bottom: 16px; }

    /* ─── FORM ───────────────────────────────────────────────────────────── */
    .fg { margin-bottom: 13px; }
    .fg label {
      display: block; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-muted); margin-bottom: 5px;
    }
    .fg input, .fg textarea, .fg select {
      width: 100%; background: var(--bg3); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text); padding: 11px 13px;
      font-size: 15px; font-family: inherit; outline: none;
      -webkit-appearance: none; transition: border-color 0.2s;
    }
    .fg input:focus, .fg textarea:focus { border-color: var(--green-light); }
    .fg textarea { resize: vertical; min-height: 65px; }
    .fg select option { background: var(--bg3); }
    .row { display: flex; gap: 10px; }
    .row .fg { flex: 1; }

    .size-group { display: flex; gap: 8px; }
    .size-opt { flex: 1; }
    .size-opt input[type=radio] { display: none; }
    .size-opt label {
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 6px; background: var(--bg3); border: 2px solid var(--border);
      border-radius: 8px; cursor: pointer; font-size: 13px; color: var(--text-muted);
      gap: 3px; text-transform: none; letter-spacing: 0;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
    }
    .size-opt label .sz { font-size: 20px; }
    .size-opt input[type=radio]:checked + label {
      border-color: var(--green-light); background: rgba(61,122,53,0.22); color: var(--text);
    }
    .geocode-hint { font-size: 11px; color: var(--text-muted); font-style: italic; margin-top: 3px; min-height: 14px; }
    .modal-actions {
      display: flex; gap: 8px;
      margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
    }

    /* ─── DETAIL SHEET ───────────────────────────────────────────────────── */
    .detail-address { font-size: 16px; font-weight: 700; margin-bottom: 12px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
    .dg-item { background: var(--bg3); border-radius: 8px; padding: 10px 12px; }
    .dg-lbl { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 3px; }
    .dg-val { font-size: 16px; font-weight: 700; }
    .detail-note {
      background: var(--bg3); border-radius: 8px; padding: 11px 13px;
      font-style: italic; color: var(--tan); font-size: 14px; margin-bottom: 12px;
    }

    /* ─── EMPTY STATE ────────────────────────────────────────────────────── */
    .empty { text-align: center; padding: 36px 16px; color: var(--text-muted); }
    .empty .ei { font-size: 40px; margin-bottom: 10px; }
    .empty p   { font-size: 13px; line-height: 1.5; }

    /* ─── TOAST ──────────────────────────────────────────────────────────── */
    #toast {
      position: fixed; bottom: 30px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--green-dark); border: 1px solid var(--khaki); color: var(--text);
      padding: 10px 20px; border-radius: 20px; font-size: 14px; font-weight: 600;
      z-index: 99999; pointer-events: none; opacity: 0;
      transition: opacity 0.25s, transform 0.25s;
      white-space: nowrap; max-width: 90vw; text-align: center;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg2); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  </style>
</head>
<body>

<!-- ▌HEADER ▌-->
<header>
  <div class="logo">🌲</div>
  <div class="header-text">
    <h1>Tree Drive</h1>
    <p>Scout Pickup Ops</p>
  </div>
  <div class="header-right">
    <div class="conn-dot" id="connDot" title="Disconnected"></div>
    <button class="icon-btn" onclick="exportData()" title="Export JSON">📤</button>
    <button class="icon-btn" onclick="importData()" title="Import JSON">📥</button>
    <div class="role-toggle">
      <button class="role-btn active" id="btnSpotter" onclick="setRole('spotter')">🔍 Spot</button>
      <button class="role-btn"        id="btnCrew"    onclick="setRole('crew')">🚛 Crew</button>
    </div>
  </div>
</header>

<!-- ▌STATS ▌-->
<div class="stats-bar">
  <div class="stat"><div class="stat-val"   id="sSpo">0</div><div class="stat-lbl">Spotted</div></div>
  <div class="stat"><div class="stat-val g" id="sAvl">0</div><div class="stat-lbl">Available</div></div>
  <div class="stat"><div class="stat-val o" id="sClm">0</div><div class="stat-lbl">Claimed</div></div>
  <div class="stat"><div class="stat-val s" id="sLod">0</div><div class="stat-lbl">Loaded</div></div>
</div>

<!-- ▌MAIN ▌-->
<div class="main">
  <div class="map-wrap">
    <div id="map"></div>
    <div class="map-hint" id="mapHint">Tap map to spot a tree 🌲</div>
    <button class="locate-fab" onclick="locateUser()" title="My location">📍</button>
    <button class="list-fab" id="listFab" onclick="toggleSheet()" style="display:none;">📋</button>
  </div>

  <div class="crew-panel hidden" id="crewPanel">
    <div class="panel-head">
      📋 Tree Pickup List
      <span class="panel-count" id="panelCount">0 available</span>
    </div>
    <div class="tree-list" id="treeList"></div>
    <div class="panel-toolbar">
      <button class="btn btn-gray btn-sm" onclick="clearLoaded()">🗑 Clear Loaded</button>
    </div>
  </div>
</div>

<!-- ▌ADD TREE MODAL ▌-->
<div class="overlay hidden" id="addOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-title">🌲 Spot a Tree</div>
    <div class="fg">
      <label>Address</label>
      <input type="text" id="fAddr" placeholder="Fetching address…" autocomplete="off" />
      <div class="geocode-hint" id="geocodeHint"></div>
    </div>
    <div class="row">
      <div class="fg">
        <label>Number of Trees</label>
        <input type="number" id="fCount" value="1" min="1" max="99" inputmode="numeric" />
      </div>
      <div class="fg">
        <label>Spotter Initials</label>
        <input type="text" id="fSpotter" placeholder="e.g. JD" maxlength="5" autocomplete="off" />
      </div>
    </div>
    <div class="fg">
      <label>Tree Size</label>
      <div class="size-group">
        <div class="size-opt">
          <input type="radio" name="sz" id="szS" value="small" checked />
          <label for="szS"><span class="sz">🌱</span>Small</label>
        </div>
        <div class="size-opt">
          <input type="radio" name="sz" id="szM" value="medium" />
          <label for="szM"><span class="sz">🌲</span>Medium</label>
        </div>
        <div class="size-opt">
          <input type="radio" name="sz" id="szL" value="large" />
          <label for="szL"><span class="sz">🎄</span>Large</label>
        </div>
      </div>
    </div>
    <div class="fg">
      <label>Notes</label>
      <textarea id="fNotes" placeholder="e.g. Behind fence · at curb · call first…"></textarea>
    </div>
    <div class="modal-actions">
      <button class="btn btn-gray" onclick="closeAdd()">Cancel</button>
      <button class="btn btn-green" id="saveBtn" onclick="saveTree()">📍 Save Tree</button>
    </div>
  </div>
</div>

<!-- ▌DETAIL MODAL ▌-->
<div class="overlay hidden" id="detailOverlay">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:12px;">
      <div class="sheet-title" style="margin-bottom:0;">Tree Details</div>
      <div id="detailBadge"></div>
    </div>
    <div class="detail-address" id="detailAddr"></div>
    <div class="detail-grid">
      <div class="dg-item"><div class="dg-lbl">Trees</div>  <div class="dg-val" id="dTrees"></div></div>
      <div class="dg-item"><div class="dg-lbl">Size</div>   <div class="dg-val" id="dSize"></div></div>
      <div class="dg-item"><div class="dg-lbl">Spotter</div><div class="dg-val" id="dSpotter"></div></div>
      <div class="dg-item"><div class="dg-lbl">Spotted</div><div class="dg-val" id="dTime" style="font-size:12px;"></div></div>
    </div>
    <div class="detail-note" id="dNote" style="display:none;"></div>
    <div class="modal-actions" id="detailActions"></div>
  </div>
</div>

<!-- ▌TOAST ▌-->
<div id="toast"></div>

<!-- Hidden import input -->
<input type="file" id="importFile" accept=".json" style="display:none;" onchange="handleImport(event)" />

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
// ─── STATE ────────────────────────────────────────────────────────────────────
let trees = [];
let role = 'spotter';
let map, userMarker, ws;
let userLat = null, userLng = null;
let pendingLat = null, pendingLng = null;
let markers = {};
let activeId = null;
let mobileSheetOpen = false;
const isMobile = () => window.innerWidth <= 640;

// ─── API HELPERS ──────────────────────────────────────────────────────────────
async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(path, opts);
  if (!r.ok) throw new Error(`API ${method} ${path} → ${r.status}`);
  return r.json();
}

// ─── WEBSOCKET ────────────────────────────────────────────────────────────────
function connectWS() {
  const proto = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${proto}://${location.host}`);

  ws.onopen = () => setConn(true);
  ws.onclose = () => { setConn(false); setTimeout(connectWS, 3000); };

  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'init') {
      trees = msg.trees;
      renderMarkers(); renderList(); updateStats();
    } else if (msg.type === 'create') {
      if (!trees.find(t => t.id === msg.tree.id)) {
        trees.unshift(msg.tree);
        addMarker(msg.tree);
        renderList(); updateStats();
        toast(`🌲 New tree spotted — ${msg.tree.address}`);
      }
    } else if (msg.type === 'update') {
      const i = trees.findIndex(t => t.id === msg.tree.id);
      if (i >= 0) { trees[i] = msg.tree; refreshMarker(msg.tree.id); }
      renderList(); updateStats();
      if (activeId === msg.tree.id) buildDetailActions(msg.tree);
    } else if (msg.type === 'delete') {
      if (markers[msg.id]) { markers[msg.id].remove(); delete markers[msg.id]; }
      trees = trees.filter(t => t.id !== msg.id);
      renderList(); updateStats();
      if (activeId === msg.id) closeDetail();
    } else if (msg.type === 'clearLoaded') {
      trees.filter(t => t.status === 'picked_up').forEach(t => {
        if (markers[t.id]) { markers[t.id].remove(); delete markers[t.id]; }
      });
      trees = trees.filter(t => t.status !== 'picked_up');
      renderList(); updateStats();
    }
  };
}

function setConn(live) {
  const dot = document.getElementById('connDot');
  dot.classList.toggle('live', live);
  dot.title = live ? 'Live — synced with server' : 'Disconnected — reconnecting…';
}

// ─── MAP INIT ─────────────────────────────────────────────────────────────────
function initMap() {
  map = L.map('map', { zoomControl: false, center: [47.6062, -122.3321], zoom: 13 });
  L.control.zoom({ position: 'topright' }).addTo(map);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
    maxZoom: 19
  }).addTo(map);
  map.on('click', e => {
    if (role !== 'spotter') return;
    pendingLat = e.latlng.lat;
    pendingLng = e.latlng.lng;
    openAdd(pendingLat, pendingLng);
  });
  locateUser(true);
}

function locateUser(fly) {
  if (!navigator.geolocation) return;
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude;
    userLng = pos.coords.longitude;
    if (userMarker) userMarker.remove();
    userMarker = L.marker([userLat, userLng], {
      icon: L.divIcon({
        html: `<div style="width:16px;height:16px;background:#4fc3f7;border:3px solid #fff;border-radius:50%;box-shadow:0 0 8px rgba(79,195,247,.7);"></div>`,
        iconSize: [16,16], iconAnchor: [8,8], className: ''
      }), zIndexOffset: 1000
    }).addTo(map).bindPopup('📍 You are here');
    if (fly) map.setView([userLat, userLng], 14);
    renderList();
  }, () => {});
}

// ─── ICONS ────────────────────────────────────────────────────────────────────
const PIN = { available: '#5cb85c', claimed: '#f0ad4e', picked_up: '#777' };

function makeIcon(status) {
  const c = PIN[status] || PIN.available;
  const op = status === 'picked_up' ? 0.55 : 1;
  return L.divIcon({
    html: `<div style="opacity:${op};filter:drop-shadow(0 2px 3px rgba(0,0,0,.5));">
      <svg width="28" height="36" viewBox="0 0 28 36" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 1C7.92 1 3 5.92 3 12c0 8.25 11 23 11 23S25 20.25 25 12C25 5.92 20.08 1 14 1z"
              fill="${c}" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
        <text x="14" y="15" text-anchor="middle" dominant-baseline="central" font-size="11">🌲</text>
      </svg></div>`,
    iconSize: [28,36], iconAnchor: [14,36], popupAnchor: [0,-36], className: ''
  });
}

// ─── MARKERS ──────────────────────────────────────────────────────────────────
function renderMarkers() {
  Object.values(markers).forEach(m => m.remove());
  markers = {};
  trees.forEach(addMarker);
}
function addMarker(t) {
  const m = L.marker([t.lat, t.lng], { icon: makeIcon(t.status) })
    .addTo(map).on('click', () => openDetail(t.id));
  markers[t.id] = m;
}
function refreshMarker(id) {
  const t = trees.find(t => t.id === id);
  if (t && markers[id]) markers[id].setIcon(makeIcon(t.status));
}

// ─── ADD MODAL ────────────────────────────────────────────────────────────────
function openAdd(lat, lng) {
  document.getElementById('addOverlay').classList.remove('hidden');
  document.getElementById('fAddr').value = '';
  document.getElementById('fCount').value = 1;
  document.getElementById('fNotes').value = '';
  document.getElementById('fSpotter').value = localStorage.getItem('td_spotter') || '';
  document.getElementById('szS').checked = true;
  document.getElementById('geocodeHint').textContent = 'Fetching address…';
  geocode(lat, lng);
}
function closeAdd() {
  document.getElementById('addOverlay').classList.add('hidden');
  pendingLat = pendingLng = null;
}

async function geocode(lat, lng) {
  try {
    const r = await fetch(
      `https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lng}&zoom=18&addressdetails=1`,
      { headers: { 'Accept-Language': 'en' } }
    );
    const d = await r.json();
    const a = d.address || {};
    let s = '';
    if (a.house_number && a.road) s = `${a.house_number} ${a.road}`;
    else if (a.road) s = a.road;
    else s = (d.display_name || '').split(',').slice(0,2).join(',');
    const city = a.city || a.town || a.village || a.suburb;
    if (city) s += `, ${city}`;
    document.getElementById('fAddr').value = s;
    document.getElementById('geocodeHint').textContent = '';
  } catch {
    document.getElementById('fAddr').value = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
    document.getElementById('geocodeHint').textContent = 'Could not auto-fill — enter manually';
  }
}

async function saveTree() {
  const addr = document.getElementById('fAddr').value.trim();
  if (!addr) { toast('Enter an address first'); return; }
  const spotter = document.getElementById('fSpotter').value.trim();
  if (spotter) localStorage.setItem('td_spotter', spotter);

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = 'Saving…';

  const t = {
    id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
    lat: pendingLat, lng: pendingLng,
    address: addr,
    trees: parseInt(document.getElementById('fCount').value) || 1,
    size: document.querySelector('input[name="sz"]:checked').value,
    notes: document.getElementById('fNotes').value.trim(),
    spotter, status: 'available',
    claimedAt: null, pickedUpAt: null, createdAt: Date.now()
  };

  try {
    await api('POST', '/api/trees', t);
    // Server broadcasts — WS onmessage handles local state
    closeAdd();
    map.setView([t.lat, t.lng], Math.max(map.getZoom(), 15));
  } catch {
    toast('❌ Save failed — check connection');
  } finally {
    btn.disabled = false; btn.textContent = '📍 Save Tree';
  }
}

// ─── DETAIL MODAL ─────────────────────────────────────────────────────────────
function openDetail(id) {
  const t = trees.find(t => t.id === id);
  if (!t) return;
  activeId = id;
  document.getElementById('detailOverlay').classList.remove('hidden');
  document.getElementById('detailAddr').textContent = t.address;
  document.getElementById('dTrees').textContent   = `${t.trees} 🌲`;
  document.getElementById('dSize').textContent    = {small:'🌱 Small',medium:'🌲 Med',large:'🎄 Large'}[t.size]||t.size;
  document.getElementById('dSpotter').textContent = t.spotter || '—';
  document.getElementById('dTime').textContent    = fmtTime(t.createdAt);
  document.getElementById('detailBadge').innerHTML = `<span class="badge badge-${t.status}">${statusLbl(t.status)}</span>`;
  const noteEl = document.getElementById('dNote');
  if (t.notes) { noteEl.textContent = `"${t.notes}"`; noteEl.style.display = 'block'; }
  else noteEl.style.display = 'none';
  buildDetailActions(t);
}
function closeDetail() {
  document.getElementById('detailOverlay').classList.add('hidden');
  activeId = null;
}
function buildDetailActions(t) {
  const el = document.getElementById('detailActions');
  let h = `<button class="btn btn-gray" onclick="closeDetail()">Close</button>`;
  if (role === 'crew') {
    if (t.status === 'available') {
      h += `<button class="btn btn-khaki" onclick="claimTree('${t.id}')">🚩 Claim</button>`;
      h += `<button class="btn btn-orange" onclick="loadTree('${t.id}')">✅ Load It!</button>`;
    } else if (t.status === 'claimed') {
      h += `<button class="btn btn-orange" onclick="loadTree('${t.id}')">✅ Load It!</button>`;
      h += `<button class="btn btn-gray" onclick="unclaimTree('${t.id}')">↩ Release</button>`;
    } else {
      h += `<button class="btn btn-gray" disabled>Already Loaded</button>`;
    }
  } else {
    if (t.status !== 'picked_up') {
      h += `<button class="btn btn-red" onclick="deleteTree('${t.id}')">🗑 Delete</button>`;
    }
  }
  el.innerHTML = h;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────
async function claimTree(id) {
  try {
    await api('PATCH', `/api/trees/${id}`, { status: 'claimed', claimedAt: Date.now() });
    closeDetail();
  } catch { toast('❌ Failed — check connection'); }
}
async function unclaimTree(id) {
  try {
    await api('PATCH', `/api/trees/${id}`, { status: 'available', claimedAt: null });
    closeDetail();
  } catch { toast('❌ Failed — check connection'); }
}
async function loadTree(id) {
  const t = trees.find(t => t.id === id);
  try {
    await api('PATCH', `/api/trees/${id}`, { status: 'picked_up', pickedUpAt: Date.now() });
    if (t) toast(`✅ ${t.trees} tree${t.trees>1?'s':''} loaded!`);
    closeDetail();
  } catch { toast('❌ Failed — check connection'); }
}
async function deleteTree(id) {
  if (!confirm('Delete this tree?')) return;
  try {
    await api('DELETE', `/api/trees/${id}`);
    closeDetail();
  } catch { toast('❌ Failed — check connection'); }
}
async function clearLoaded() {
  if (!confirm('Remove all loaded trees from the map?')) return;
  try {
    await api('DELETE', '/api/trees?status=picked_up');
  } catch { toast('❌ Failed — check connection'); }
}

// ─── LIST ─────────────────────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('treeList');
  let active = trees.filter(t => t.status !== 'picked_up');
  let done   = trees.filter(t => t.status === 'picked_up');

  if (userLat !== null) {
    active.sort((a,b) => dist(userLat,userLng,a.lat,a.lng) - dist(userLat,userLng,b.lat,b.lng));
  }

  const all = [...active, ...done];
  document.getElementById('panelCount').textContent =
    `${trees.filter(t=>t.status==='available').length} available`;

  if (!all.length) {
    el.innerHTML = `<div class="empty"><div class="ei">🌲</div><p>No trees spotted yet.<br>Switch to Spotter and tap the map!</p></div>`;
    return;
  }

  const SZ = { small:'🌱 Sm', medium:'🌲 Med', large:'🎄 Lg' };
  el.innerHTML = all.map(t => {
    const d = userLat !== null ? `<span class="card-dist">${distStr(userLat,userLng,t.lat,t.lng)}</span>` : '';
    let acts = '';
    if (t.status === 'available') {
      acts = `<div class="card-actions">
        <button class="btn btn-khaki btn-sm" onclick="claimTree('${t.id}');event.stopPropagation()">🚩 Claim</button>
        <button class="btn btn-orange btn-sm" onclick="loadTree('${t.id}');event.stopPropagation()">✅ Load It</button>
      </div>`;
    } else if (t.status === 'claimed') {
      acts = `<div class="card-actions">
        <button class="btn btn-orange btn-sm" onclick="loadTree('${t.id}');event.stopPropagation()">✅ Load It</button>
        <button class="btn btn-gray btn-sm" onclick="unclaimTree('${t.id}');event.stopPropagation()">↩ Release</button>
      </div>`;
    }
    return `<div class="tree-card ${t.status}" onclick="openDetail('${t.id}');flyTo('${t.id}')">
      <div class="card-top"><div class="card-address">${t.address}</div>${d}</div>
      <div class="card-meta">${t.trees} tree${t.trees>1?'s':''} · ${SZ[t.size]||t.size}${t.spotter?` · ${t.spotter}`:''}</div>
      ${t.notes ? `<div class="card-note">${t.notes}</div>` : ''}
      ${acts}
    </div>`;
  }).join('');
}

function flyTo(id) {
  const t = trees.find(t => t.id === id);
  if (t) map.setView([t.lat, t.lng], Math.max(map.getZoom(), 16));
}

// ─── STATS ────────────────────────────────────────────────────────────────────
function updateStats() {
  document.getElementById('sSpo').textContent = trees.length;
  document.getElementById('sAvl').textContent = trees.filter(t=>t.status==='available').length;
  document.getElementById('sClm').textContent = trees.filter(t=>t.status==='claimed').length;
  document.getElementById('sLod').textContent = trees.filter(t=>t.status==='picked_up').length;
}

// ─── ROLE ─────────────────────────────────────────────────────────────────────
function setRole(r) {
  role = r;
  document.getElementById('btnSpotter').classList.toggle('active', r==='spotter');
  document.getElementById('btnCrew').classList.toggle('active', r==='crew');
  const panel = document.getElementById('crewPanel');
  const hint  = document.getElementById('mapHint');
  const fab   = document.getElementById('listFab');

  if (r === 'crew') {
    hint.style.opacity = '0';
    fab.style.display = 'flex';
    if (!isMobile()) { panel.classList.remove('hidden'); mobileSheetOpen = true; }
    renderList(); locateUser(false);
  } else {
    hint.style.opacity = '1';
    fab.style.display = 'none';
    panel.classList.add('hidden');
    mobileSheetOpen = false;
  }
  localStorage.setItem('td_role', r);
}

// ─── MOBILE SHEET ─────────────────────────────────────────────────────────────
function toggleSheet() {
  mobileSheetOpen = !mobileSheetOpen;
  const panel = document.getElementById('crewPanel');
  const fab   = document.getElementById('listFab');
  if (mobileSheetOpen) { panel.classList.remove('hidden'); fab.textContent = '🗺'; }
  else                 { panel.classList.add('hidden');    fab.textContent = '📋'; }
}

// ─── EXPORT / IMPORT ──────────────────────────────────────────────────────────
function exportData() {
  const blob = new Blob([JSON.stringify({version:1,exported:new Date().toISOString(),trees},null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `tree-drive-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('📤 Data exported');
}
function importData() { document.getElementById('importFile').click(); }
async function handleImport(e) {
  const file = e.target.files[0]; if (!file) return;
  const text = await file.text();
  try {
    const d = JSON.parse(text);
    const incoming = d.trees || d;
    if (!Array.isArray(incoming)) throw new Error();
    const result = await api('POST', '/api/trees/bulk', incoming);
    toast(`📥 Imported ${result.imported} new tree${result.imported!==1?'s':''}`);
  } catch { toast('Import failed — invalid file'); }
  e.target.value = '';
}

// ─── UTILS ────────────────────────────────────────────────────────────────────
function dist(la1,lo1,la2,lo2) {
  const R=3959, dLa=(la2-la1)*Math.PI/180, dLo=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function distStr(la1,lo1,la2,lo2) {
  const d=dist(la1,lo1,la2,lo2);
  return d<0.1?`${Math.round(d*5280)}ft`:`${d.toFixed(1)}mi`;
}
function fmtTime(ts) {
  if (!ts) return '—';
  return new Date(ts).toLocaleString([],{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
function statusLbl(s) { return {available:'● Available',claimed:'● Claimed',picked_up:'✓ Loaded'}[s]||s; }

let _toastTimer;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), 2600);
}

// ─── CLOSE OVERLAYS ON BG CLICK ───────────────────────────────────────────────
document.getElementById('addOverlay').addEventListener('click',    e => { if(e.target.id==='addOverlay')    closeAdd(); });
document.getElementById('detailOverlay').addEventListener('click', e => { if(e.target.id==='detailOverlay') closeDetail(); });

window.addEventListener('resize', () => {
  if (!isMobile() && role==='crew') {
    document.getElementById('crewPanel').classList.remove('hidden');
    document.getElementById('listFab').style.display = 'none';
  }
  if (isMobile() && role==='crew') {
    document.getElementById('listFab').style.display = 'flex';
  }
});

// ─── BOOT ─────────────────────────────────────────────────────────────────────
initMap();
connectWS();
const savedRole = localStorage.getItem('td_role') || 'spotter';
setRole(savedRole);
</script>
